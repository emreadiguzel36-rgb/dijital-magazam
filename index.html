<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiberCimri - Yapay Zeka Destekli Mega Engine</title>
    <style>
        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1e29; color: #ffffff; overflow-x: hidden;
        }

        /* ========================================================
           ANA PLATFORM (MEGA ENGINE ARAYÜZÜ)
           ======================================================== */
        .navbar-header {
            background-color: #11141d; padding: 20px;
            border-bottom: 2px solid #00d2ff; text-align: center;
        }
        .main-brand-title {
            color: #00d2ff; font-size: 36px; font-weight: 900; margin: 0 0 20px 0;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        .navbar-controls {
            display: flex; max-width: 1300px; margin: 0 auto;
            align-items: center; justify-content: space-between; gap: 15px;
        }
        .search-input-field {
            flex-grow: 1; background-color: #090d16; border: 1px solid #00d2ff;
            border-radius: 25px; padding: 12px 24px; color: #ffffff; font-size: 14px; outline: none;
        }
        .user-status-badge {
            background-color: #00ffaa; color: #000000; padding: 12px 24px;
            font-weight: bold; border-radius: 25px; font-size: 13px;
        }

        .main-wrapper-content { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .database-card { background-color: #2b303c; border-radius: 16px; padding: 30px; }
        
        .product-row {
            background-color: #171a23; border-radius: 12px; padding: 20px;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;
        }
        .price-text-highlight { color: #00ffaa; font-weight: 800; font-size: 18px; }

        /* ========================================================
           YAPAY ZEKA CHATBOT ARAYÜZÜ (SAĞ ALT KÖŞE)
           ======================================================== */
        .ai-chat-widget {
            position: fixed; bottom: 30px; right: 30px; width: 350px;
            background-color: #11141d; border: 2px solid #ff007f;
            border-radius: 16px; box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            display: flex; flex-direction: column; overflow: hidden; z-index: 100000;
        }
        .ai-chat-header {
            background: linear-gradient(90deg, #ff0055, #df0000);
            padding: 15px; font-weight: bold; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .ai-chat-messages {
            height: 250px; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px; font-size: 13px;
            background-color: #090d16;
        }
        .msg { padding: 10px 14px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .msg.user { background-color: #ff007f; color: #ffffff; align-self: flex-end; }
        .msg.ai { background-color: #2b303c; color: #00d2ff; align-self: flex-start; }
        
        .ai-chat-input-area { display: flex; border-top: 1px solid #222; background-color: #11141d; }
        .ai-chat-input {
            flex-grow: 1; border: none; padding: 12px; background: transparent;
            color: #ffffff; outline: none; font-size: 13px;
        }
        .ai-send-btn {
            background-color: #00d2ff; border: none; color: #000000;
            padding: 0 15px; font-weight: bold; cursor: pointer; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="navbar-header">
        <h1 class="main-brand-title">SiberCimri Mega Engine</h1>
        <div class="navbar-controls">
            <input type="text" class="search-input-field" placeholder="Sistem içinde akıllı arama yapın...">
            <div class="user-status-badge">👑 EMRE ADIGÜZEL</div>
        </div>
    </div>

    <div class="main-wrapper-content">
        <div class="database-card">
            <h2 style="margin-top:0;">📋 Aktif Pazar Yeri Verileri</h2>
            <div class="product-row">
                <div>
                    <strong style="font-size:18px;">Apple iPhone 16 Pro Max 512 GB</strong><br>
                    <span style="color:#00d2ff; font-size:12px;">Sektör: Elektronik</span>
                </div>
                <div>
                    <span class="price-text-highlight">89.500 TL</span>
                </div>
            </div>
        </div>
    </div>

    <div class="ai-chat-widget">
        <div class="ai-chat-header">
            <span>🤖 SiberCimri AI Smart Assistant</span>
            <span style="font-size: 10px; background: #00ffaa; color: #000; padding: 2px 6px; border-radius: 10px;">AKTİF</span>
        </div>
        <div class="ai-chat-messages" id="aiChatBox">
            <div class="msg ai">Merhaba Emre Bey! Ben SiberCimri Akıllı Asistanı. Fiyat analizleri ve pazar yeri verileri konusunda size nasıl yardımcı olabilirim?</div>
        </div>
        <div class="ai-chat-input-area">
            <input type="text" id="aiInputField" class="ai-chat-input" placeholder="Yapay zekaya sorun..." onkeypress="if(event.key === 'Enter') sendToAI()">
            <button class="ai-send-btn" onclick="sendToAI()">GÖNDER</button>
        </div>
    </div>

    <script>
        // Üretici firmalardan (Google veya OpenAI) aldığınız resmi API anahtarını buraya eklemelisiniz.
        const AI_API_KEY = "YAPAY_ZEKA_API_KEY_BURAYA"; 

        async function sendToAI() {
            const inputEl = document.getElementById("aiInputField");
            const userText = inputEl.value.trim();
            if (!userText) return;

            const chatBox = document.getElementById("aiChatBox");

            // 1. Kullanıcı mesajını ekrana bas
            chatBox.innerHTML += `<div class="msg user">${userText}</div>`;
            inputEl.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Yapay zeka yükleniyor simülasyonu
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div class="msg ai" id="${loadingId}">Düşünüyor...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            if (AI_API_KEY === "YAPAY_ZEKA_API_KEY_BURAYA") {
                setTimeout(() => {
                    document.getElementById(loadingId).innerText = "Yapay zeka yanıtı simüle edildi. Canlı yanıtlar almak için lütfen kodun içindeki AI_API_KEY alanına geçerli bir Google Gemini veya OpenAI API anahtarı entegre edin.";
                }, 1000);
                return;
            }

            // 3. Gerçek Yapay Zeka API İstek Protokolü (Örnek: Google Gemini API)
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${AI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sen SiberCimri platformunun akıllı pazar analiz asistanısın. Kullanıcının sorusu: ${userText}` }] }]
                    })
                });

                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                document.getElementById(loadingId).innerText = aiResponseText;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Sistem bağlantı hatası oluştu. Lütfen API anahtarınızı veya internet bağlantınızı kontrol edin.";
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>

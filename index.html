<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelişmiş Dijital Mağazam</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f4f6f9; 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        #panel, #fiyatlar, #envanter, #iletisim {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .bakiye-kutusu {
            font-size: 20px;
            color: #27ae60;
            font-weight: bold;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #f8f9fa;
            margin: 10px 0;
            padding: 15px;
            border-left: 5px solid #e67e22;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button, .btn-gonder {
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-satin-al { background-color: #e67e22; }
        .btn-satin-al:hover { background-color: #d35400; }
        
        .btn-bakiye-yukle { 
            background-color: #2ecc71; 
            margin-top: 10px;
            padding: 10px 20px;
        }
        .btn-bakiye-yukle:hover { background-color: #27ae60; }

        .envanter-item {
            border-left: 5px solid #3498db;
            background-color: #e8f4f8;
        }

        /* YENI: İletişim Formu Tasarım Ayarları */
        .form-grup {
            margin-bottom: 15px;
        }
        .form-grup label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-grup input, .form-grup textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Taşmayı önler */
        }
        .btn-gonder {
            background-color: #34495e;
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .btn-gonder:hover { background-color: #2c3e50; }
    </style>
</head>
<body>

    <header>
        <h1>Dijital Mağazam</h1>
    </header>

    <section id="panel">
        <h2>Kullanıcı Paneli</h2>
        <p>Hoş geldin, <strong>Ziyaretçi!</strong></p>
        <p>Mevcut Bakiyeniz: <span class="bakiye-kutusu" id="bakiyeMiktari">500.00 TL</span></p>
        <button class="btn-bakiye-yukle" onclick="bakiyeYukle()">➕ 100 TL Bakiye Yükle</button>
    </section>

    <section id="fiyatlar">
        <h2>Ürünlerimiz & Fiyatlar</h2>
        <ul>
            <li>
                <span>📦 Gümüş Paket (50 TL)</span> 
                <button class="btn-satin-al" onclick="paketSatinAl(50, '📦 Gümüş Paket')">Satın Al</button>
            </li>
            <li>
                <span>🚀 Altın Paket (150 TL)</span> 
                <button class="btn-satin-al" onclick="paketSatinAl(150, '🚀 Altın Paket')">Satın Al</button>
            </li>
        </ul>
    </section>

    <section id="envanter">
        <h2>Satın Alınan Paketler</h2>
        <p id="bosMesaji">Henüz hiçbir paket satın almadınız.</p>
        <ul id="envanterListesi"></ul>
    </section>

    <section id="iletisim">
        <h2>Bizimle İletişime Geçin</h2>
        <form action="https://formspree.io/f/xykvgznk" method="POST">
            <div class="form-grup">
                <label>E-Posta Adresiniz:</label>
                <input type="email" name="email" placeholder="ornek@mail.com" required>
            </div>
            <div class="form-grup">
                <label>Mesajınız:</label>
                <textarea name="message" rows="5" placeholder="Mesajınızı buraya yazın..." required></textarea>
            </div>
            <button type="submit" class="btn-gonder">📧 Mesajı Gönder</button>
        </form>
    </section>

    <script>
        let mevcutBakiye = 500;

        function bakiyeYukle() {
            mevcutBakiye = mevcutBakiye + 100;
            document.getElementById("bakiyeMiktari").innerText = mevcutBakiye + ".00 TL";
        }

        function paketSatinAl(fiyat, paketAdi) {
            if (mevcutBakiye >= fiyat) {
                mevcutBakiye = mevcutBakiye - fiyat;
                document.getElementById("bakiyeMiktari").innerText = mevcutBakiye + ".00 TL";
                
                document.getElementById("bosMesaji").style.display = "none";

                let liste = document.getElementById("envanterListesi");
                let yeniUrun = document.createElement("li");
                yeniUrun.className = "envanter-item";
                yeniUrun.innerHTML = "<span>" + paketAdi + "</span> <strong>Aktif</strong>";
                liste.appendChild(yeniUrun);

                alert("Tebrikler! " + paketAdi + " başarıyla satın alındı.");
            } else {
                alert("Yetersiz bakiye! Lütfen bakiye yükleyin.");
            }
        }
    </script>

</body>
</html>

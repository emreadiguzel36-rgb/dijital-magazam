<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiberCimri Pro - Enterprise Engine</title>
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; color: #ffffff; overflow-x: hidden; min-height: 100vh;
            /* ARKA PLAN RESMİ HEM GİRİŞTE HEM ANA SİTEDE SABİT KALACAK */
            background: url('image_368ddf.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* ========================================================
           %100 KİLİTLENMEZ GİRİŞ PANELİ (SECURE GATEWAY)
           ======================================================== */
        #authGateway {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.45); 
            backdrop-filter: blur(12px); 
            display: flex; align-items: center; justify-content: center;
            z-index: 999999; opacity: 1; transition: opacity 0.4s ease;
        }
        
        .auth-container {
            background: #111726; 
            border: 2px solid #ff007f; border-radius: 24px;
            padding: 40px; width: 100%; max-width: 450px; box-sizing: border-box;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.5); text-align: center;
            position: relative;
        }
        .auth-container h2 { color: #00f2fe; margin: 0 0 8px 0; text-shadow: 0 0 10px rgba(0, 242, 254, 0.3); font-size: 24px; }
        .auth-container p { color: #94a3b8; font-size: 13px; margin: 0 0 25px 0; line-height: 1.4; }

        /* ANA SİTE BAŞLANGIÇTA GİZLİ TUTULUR */
        #anaIcerik { display: none; }

        .form-grup { margin-bottom: 18px; text-align: left; }
        .form-grup label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 13px; font-weight: 600; }
        .form-grup input { 
            width: 100%; padding: 14px 16px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.15); background: #000000; 
            color: #ffffff; box-sizing: border-box; font-size: 15px; outline: none;
        }
        .form-grup input:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        
        .btn-auth { 
            background: linear-gradient(135deg, #ff007f, #b91c1c); color: #fff; border: none; 
            padding: 15px; width: 100%; font-weight: bold; border-radius: 12px; 
            cursor: pointer; font-size: 15px; letter-spacing: 0.5px; transition: 0.2s; margin-top: 10px;
        }
        .btn-auth:hover { box-shadow: 0 0 20px #ff007f; transform: translateY(-1px); }

        .sistem-log-kutusu { 
            background: rgba(0,0,0,0.85); border: 1px solid #00f2fe; border-radius: 10px; 
            padding: 14px; margin: 15px 0; font-family: monospace; font-size: 13px; 
            color: #00ff87; text-align: left; display: none; line-height: 1.6; 
        }

        /* ========================================================
           KAYMA ENGELLİ PREMIUM SİTE HEADER TASARIMI
           ======================================================== */
        header { 
            background: rgba(11, 15, 25, 0.75); 
            border-bottom: 3px solid #00f2fe;
            padding: 25px 20px; 
            backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header h1 { margin: 0 0 20px 0; font-size: 2.4em; color: #00f2fe; text-align: center; font-weight: 800; text-shadow: 0 0 15px rgba(0,242,254,0.4); }
        
        .ust-kontroller { 
            display: flex; 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .kategori-ac-btn { 
            background: #ff007f; color: #fff; border: none; padding: 14px 28px; 
            font-weight: bold; cursor: pointer; border-radius: 25px; white-space: nowrap; 
            box-shadow: 0 4px 15px rgba(255,0,127,0.3); transition: 0.2s;
        }
        .kategori-ac-btn:hover { background: #fff; color: #000; }
        
        .arama-kutusu-kapsayici { flex-grow: 1; }
        .arama-kutusu { 
            width: 100%; padding: 14px 24px; border-radius: 25px; border: 2px solid #00f2fe; 
            background: rgba(0,0,0,0.75); color: #fff; outline: none; font-size: 15px; 
            box-sizing: border-box; transition: 0.3s;
        }
        .arama-kutusu:focus { border-color: #ff007f; box-shadow: 0 0 15px rgba(255,0,127,0.3); }
        
        .user-profile-tag { 
            background: linear-gradient(135deg, #00ff87, #00b358); color: #000; 
            padding: 14px 28px; font-weight: 800; border-radius: 25px; font-size: 14px; 
            white-space: nowrap; box-shadow: 0 4px 15px rgba(0,255,135,0.3); letter-spacing: 0.5px;
        }

        /* İÇERİK KARTLARI VE GÖRSEL PANAL KATMANLARI */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        section { 
            background: rgba(17, 23, 38, 0.75); 
            padding: 35px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        h2 { color: #ff007f; margin-top: 0; font-size: 26px; letter-spacing: 0.5px; margin-bottom: 25px; }
        
        .karsilastirma-karti { 
            background: rgba(30, 41, 59, 0.65); padding: 30px; margin-bottom: 25px; 
            border-radius: 20px; border: 1px solid rgba(0, 242, 254, 0.2); transition: 0.3s;
        }
        .karsilastirma-karti:hover { border-color: #ff007f; box-shadow: 0 10px 30px rgba(255,0,127,0.15); transform: translateY(-2px); }
        
        .urun-ust-kisim { display: flex; align-items: center; gap: 25px; }
        .urun-gorsel-kutusu { width: 95px; height: 95px; background: #fff; border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .urun-gorsel-kutusu img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .urun-baslik { margin: 0; color: #fff; font-size: 22px; font-weight: bold; }
        
        .fiyat-tablosu { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 14px; overflow: hidden; }
        .fiyat-satiri td { padding: 18px; font-size: 16px; background: rgba(0,0,0,0.45); }
        
        .git-btn { 
            background: linear-gradient(135deg, #ff007f, #b91c1c); color: #fff; padding: 12px 28px; 
            text-decoration: none; border-radius: 20px; float: right; font-size: 13px; 
            font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 12px rgba(255,0,127,0.3); transition: 0.2s;
        }
        .git-btn:hover { box-shadow: 0 0 15px #ff007f; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="authGateway">
        <div class="auth-container">
            <h2>SiberCimri Secure Shield</h2>
            <p>Bu platform ticari gizlilik nedeniyle sadece kayıtlı üyelerimize açıktır.</p>
            
            <div id="authStep1">
                <div class="form-grup">
                    <label>Adınız:</label>
                    <input type="text" id="regAd" placeholder="Örn: Emre" required>
                </div>
                <div class="form-grup">
                    <label>Soyadınız:</label>
                    <input type="text" id="regSoyad" placeholder="Örn: Adıgüzel" required>
                </div>
                <div class="form-grup">
                    <label>Telefon Numaranız GSM:</label>
                    <input type="tel" id="regTel" placeholder="05xx xxx xx xx" required>
                </div>
                <button type="button" class="btn-auth" onclick="requestOTP()">KİMLİK DOĞRULA VE SMS KODU İSTE</button>
            </div>

            <div id="systemLog" class="sistem-log-kutusu"></div>

            <div id="authStep2" style="display: none;">
                <div class="form-grup">
                    <label>Telefonunuza Gönderilen 4 Haneli OTP Kodu:</label>
                    <input type="number" id="smsInputCode" placeholder="••••" style="text-align: center; font-size: 24px; letter-spacing: 6px;" required>
                </div>
                <button type="button" class="btn-auth" style="background: linear-gradient(135deg, #00ff87, #006633); color: #000;" onclick="verifyOTP()">SİSTEME ERİŞİM YETKİSİ VER</button>
            </div>
        </div>
    </div>


    <div id="anaIcerik">
        <header>
            <h1>SiberCimri Mega Engine</h1>
            <div class="ust-kontroller">
                <button class="kategori-ac-btn">☰ Tüm Sektörler</button>
                <div class="arama-kutusu-kapsayici">
                    <input type="text" id="aramaGirdisi" class="arama-kutusu" oninput="urunAra()" placeholder="Sistem içinde akıllı arama yapın...">
                </div>
                <div id="userLabel" class="user-profile-tag">👤 Yükleniyor...</div>
            </div>
        </header>

        <div class="container">
            <section id="fiyatMotoru">
                <h2>📋 Korunan Ticari Pazar Yeri Veri Tabanı</h2>
                <div class="karsilastirma-karti">
                    <div class="urun-ust-kim">
                        <div class="urun-gorsel-kutusu"><img src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=150"></div>
                        <div style="margin-left: 20px;">
                            <h3 class="urun-baslik">Apple iPhone 16 Pro Max 512 GB</h3>
                            <span style="color:#00f2fe; font-size:13px; font-weight: 500; display:block; margin-top:5px;">Sektör: Elektronik / Akıllı Telefon</span>
                        </div>
                    </div>
                    <table class="fiyat-tablosu">
                        <tr class="fiyat-satiri">
                            <td style="color:#fff; font-weight: 600;">Amazon TR</td>
                            <td style="color:#00ff87; font-weight:bold; font-size: 18px;">89.500 TL</td>
                            <td><a href="#" class="git-btn">Git</a></td>
                        </tr>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        let generatedOTP = null;
        let savedName = "";
        let savedSurname = "";
        let savedPhone = "";

        function requestOTP() {
            try {
                savedName = document.getElementById("regAd").value.trim();
                savedSurname = document.getElementById("regSoyad").value.trim();
                savedPhone = document.getElementById("regTel").value.trim();

                if(!savedName || !savedSurname || savedPhone.length < 10) {
                    alert("Lütfen alanları eksiksiz doldurunuz!");
                    return;
                }

                generatedOTP = Math.floor(1000 + Math.random() * 9000);
                
                let logBox = document.getElementById("systemLog");
                logBox.style.display = "block";
                logBox.innerHTML = "⏳ SMS API ağ geçidine bağlanılıyor...<br>";

                setTimeout(() => {
                    logBox.innerHTML += "🛰️ Operatör Onayı Alındı...<br>";
                    logBox.innerHTML += "📬 <span style='color:#ff007f;'>[SMS BAŞARILI]</span> Numara: " + savedPhone + "<br>🔑 Telefon Kodu: <strong style='font-size:16px; color:#fff;'> " + generatedOTP + "</strong>";
                    
                    document.getElementById("authStep1").style.display = "none";
                    document.getElementById("authStep2").style.display = "block";
                }, 800);

            } catch (err) {
                alert("Sistem hatası oluştu, lütfen sayfayı yenileyin.");
            }
        }

        function verifyOTP() {
            let enteredCode = document.getElementById("smsInputCode").value.trim();

            if(enteredCode == generatedOTP) {
                document.getElementById("authGateway").style.opacity = "0";
                
                setTimeout(() => {
                    document.getElementById("authGateway").style.display = "none";
                    document.getElementById("anaIcerik").style.display = "block";
                    document.getElementById("userLabel").innerHTML = "👑 " + savedName.toUpperCase() + " " + savedSurname.toUpperCase();
                }, 400);
            } else {
                alert("❌ Hatalı şifre girdiniz!");
            }
        }

        function urunAra() {
            let ara = document.getElementById("aramaGirdisi").value.toLowerCase().trim();
            let kartlar = document.querySelectorAll(".karsilastirma-karti");
            kartlar.forEach(k => {
                let baslik = k.querySelector(".urun-baslik").innerText.toLowerCase();
                if(baslik.indexOf(ara) > -1) { k.style.display = "block"; }
                else { k.style.display = "none"; }
            });
        }
    </script>
</body>
</html>

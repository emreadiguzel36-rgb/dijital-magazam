<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SiberCimri Pro - Tüm Hizmetler Tek Sayfada</title>
    
    <style>
        /* Siber Gece Teması */
        html {
            scroll-behavior: smooth; /* Sayfa içi geçişleri yumuşak kaydırır */
        }
        body { 
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif; 
            background: #0d1117 url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            margin: 0; 
            padding: 0; 
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Neon Başlık Paneli */
        header { 
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(10px);
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 2px solid #00f2fe;
            box-shadow: 0 4px 30px rgba(0, 242, 254, 0.2);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        header h1 { 
            margin: 0; 
            font-size: 2.5em; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #4facfe;
        }

        /* Üst Kontroller: Kategori Butonu ve Arama Motoru Yan Yana */
        .ust-kontroller {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hamburger Kategori Butonu */
        .kategori-ac-btn {
            background: rgba(255, 0, 127, 0.2);
            border: 1px solid #ff007f;
            color: #ff007f;
            font-size: 15px;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            transition: 0.3s;
            white-space: nowrap;
        }
        .kategori-ac-btn:hover { background: #ff007f; color: #000; box-shadow: 0 0 20px #ff007f; }

        /* Canlı Arama Motoru Giriş Alanı */
        .arama-kutusu {
            width: 100%;
            padding: 10px 20px;
            font-size: 15px;
            border: 1px solid rgba(0, 242, 254, 0.4);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }
        .arama-kutusu:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            background: rgba(0, 0, 0, 0.7);
        }

        /* Yandan Açılan Kategori Penceresi (Sidebar) */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100%;
            background: rgba(13, 17, 23, 0.98);
            backdrop-filter: blur(15px);
            box-shadow: 5px 0 30px rgba(0, 242, 254, 0.2);
            border-right: 2px solid #00f2fe;
            z-index: 10000;
            transition: 0.4s ease;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        .sidebar.aktif { left: 0; }
        .sidebar-baslik { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 242, 254, 0.3); padding-bottom: 15px; margin-bottom: 25px; }
        .sidebar-baslik h3 { margin: 0; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
        .kapat-btn { background: none; border: none; color: #ff007f; font-size: 24px; cursor: pointer; }

        .kategori-linkleri { display: flex; flex-direction: column; gap: 15px; }
        .kategori-linkleri a {
            color: white; text-decoration: none; font-size: 17px; padding: 12px 15px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s;
        }
        .kategori-linkleri a:hover { background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; color: #00f2fe; padding-left: 25px; }

        /* Yeni Tek Sayfa Menüsü */
        .menu { margin-top: 15px; }
        .menu a { color: #00f2fe; text-decoration: none; font-weight: bold; margin: 0 10px; padding: 8px 15px; border-radius: 30px; border: 1px solid rgba(0, 242, 254, 0.3); transition: 0.3s; font-size: 14px; }
        .menu a:hover { background: #00f2fe; color: #000; box-shadow: 0 0 15px #00f2fe; border-color: #00f2fe; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        section { 
            background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); margin-bottom: 40px;
        }
        h2 { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); margin-top: 0; font-size: 24px; border-bottom: 1px solid rgba(255,0,127,0.2); padding-bottom: 10px; }

        /* Ürün Kapsayıcı ve Gerçek Resim Düzeni */
        .urun-kapsayici { display: flex; flex-direction: column; gap: 25px; }
        .karsilastirma-karti {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
        }
        .karsilastirma-karti:hover { border-color: #00f2fe; box-shadow: 0 5px 20px rgba(0, 242, 254, 0.15); }
        
        .urun-ust-kisim { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        
        .urun-gorsel-kutusu {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        .urun-gorsel-kutusu img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .urun-baslik { font-size: 20px; font-weight: bold; margin: 0; color: #fff; text-transform: lowercase; }

        /* Fiyat Tablosu */
        .fiyat-tablosu { width: 100%; border-collapse: collapse; }
        .fiyat-satiri { 
            background: rgba(255, 255, 255, 0.02); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fiyat-satiri:hover { background: rgba(255, 255, 255, 0.06); }
        .fiyat-satiri td { padding: 12px; text-align: left; font-size: 15px; }
        
        .magaza-adi { font-weight: bold; color: #fff; }
        .magaza-fiyat { font-weight: bold; color: #00f2fe; font-size: 17px; }
        
        /* En Ucuz Rozeti */
        .en-ucuz-rozet {
            background: #00ff87;
            color: #000;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 10px #00ff87;
            margin-left: 10px;
            display: none;
        }

        .git-btn {
            background: linear-gradient(135deg, #ff007f, #7928ca);
            border: none; color: white; padding: 6px 15px; border-radius: 20px;
            cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px;
            text-decoration: none; float: right;
        }
        .git-btn:hover { box-shadow: 0 0 12px #ff007f; }

        /* Form Elemanları */
        .form-grup { margin-bottom: 15px; }
        .form-grup label { display: block; margin-bottom: 5px; font-weight: bold; color: #00f2fe; }
        .form-grup input, .form-grup textarea { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; background: rgba(0,0,0,0.4); color: white; }
        .btn-gonder { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000; font-size: 15px; border: none; padding: 12px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* Bulunamadı Uyarısı */
        #sonucBulunamadi {
            display: none; text-align: center; font-size: 18px; color: #ff007f; padding: 20px; font-weight: bold;
        }

        /* Hizmetler ve Hakkımızda Metin Düzenleri */
        .bilgi-karti {
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.04);
        }
        .bilgi-karti h3 { margin-top: 0; color: #00f2fe; }
        .bilgi-karti p { color: #cbd5e1; line-height: 1.6; margin-bottom: 0; }
    </style>
</head>
<body>

    <div id="kategoriSidebar" class="sidebar">
        <div class="sidebar-baslik">
            <h3>🗂️ Dev Siber Envanteri</h3>
            <button class="kapat-btn" onclick="kategoriMenusuKapat()">×</button>
        </div>
        <div class="kategori-linkleri">
            <a href="#kararsilastirmaAlani" onclick="kategoriFiltrele('hepsi')">🌐 Tüm Kategoriler</a>
            <a href="#kararsilastirmaAlani" onclick="kategoriFiltrele('teknoloji')">📱 Teknoloji / Elektronik</a>
            <a href="#kararsilastirmaAlani" onclick="kategoriFiltrele('giyim')">👕 Moda & Giyim</a>

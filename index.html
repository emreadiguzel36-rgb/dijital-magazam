<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SiberCimri Pro - Enterprise Auth Gateway</title>
    
    <style>
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            /* YÜKLEDİĞİN DALGALI ARKA PLAN RESMİNİ TAM EKRAN SABİTLİYORUZ */
            background: url('image_368ddf.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 0; color: #ffffff; overflow-x: hidden; min-height: 100vh;
        }

        /* ========================================================
           TAM EKRAN GİRİŞ GATEWAY (HATASIZ VE AKICI HALE GETİRİLDİ)
           ======================================================== */
        #authGateway {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.7); /* Arkadaki dalgalı resim hafiften parlasın diye transparan siyah katman */
            backdrop-filter: blur(15px); /* Premium flu efekti */
            display: flex; align-items: center; justify-content: center;
            z-index: 999999; opacity: 1; transition: opacity 0.5s ease;
        }
        
        .auth-container {
            background: rgba(15, 23, 42, 0.93); border: 2px solid #ff007f; border-radius: 24px;
            padding: 40px; width: 100%; max-width: 450px; box-sizing: border-box;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.3); text-align: center;
            position: relative; z-index: 1000000; /* Tıklama sorununu çözen kritik katman kodu */
        }
        .auth-container h2 { color: #00f2fe; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 242, 254, 0.3); font-size: 24px; }
        .auth-container p { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }

        #anaIcerik { display: none; }

        .form-grup { margin-bottom: 18px; text-align: left; }
        .form-grup label { display: block; margin-bottom: 6px; color: #cbd5e1; font-size: 13px; font-weight: 600; }
        .form-grup input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; }
        .form-grup input:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        
        .btn-auth { background: linear-gradient(135deg, #ff007f, #b91c1c); color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 15px; letter-spacing: 0.5px; transition: 0.3s; }
        .btn-auth:hover { box-shadow: 0 0 20px #ff007f; transform: translateY(-1px); }

        .sistem-log-kutusu { background: rgba(0,0,0,0.6); border: 1px solid #00f2fe; border-radius: 8px; padding: 12px; margin: 15px 0; font-family: monospace; font-size: 13px; color: #00ff87; text-align: left; display: none; line-height: 1.5; }

        /* ========================================================
           ÜST PANEL VE İÇERİK DÜZENİ
           ======================================================== */
        header { 
            background: rgba(15, 23, 42, 0.75); 
            border-bottom: 3px solid #00f2fe;
            padding: 20px;
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 999;
        }
        header h1 { margin: 0 0 15px 0; font-size: 2.2em; color: #00f2fe; text-align: center; font-weight: 800; }
        
        .ust-kontroller { display: flex; gap: 15px; max-width: 1200px; margin: 0 auto; align-items: center; justify-content: space-between; }
        .kategori-ac-btn { background: #ff007f; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 25px; white-space: nowrap; }
        
        .arama-kutusu-kapsayici { flex-grow: 1; }
        .arama-kutusu { width: 100%; padding: 12px 24px; border-radius: 25px; border: 2px solid #00f2fe; background: rgba(0,0,0,0.6); color: #fff; outline: none; font-size: 15px; box-sizing: border-box; }
        
        .user-profile-tag { background: linear-gradient(135deg, #00ff87, #00b358); color: #000; padding: 12px 24px; font-weight: 800; border-radius: 25px; font-size: 14px; white-space: nowrap; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        section { background: rgba(15, 23, 42, 0.7); padding: 35px; margin-bottom: 35px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        
        .karsilastirma-karti { background: rgba(30, 41, 59, 0.75); padding: 25px; margin-bottom: 25px; border-radius: 20px; border: 1px solid rgba(0, 242, 254, 0.2); }
        .urun-ust-kisim { display: flex; align-items: center; gap: 25px; }
        .urun-gorsel-kutusu { width: 90px; height: 90px; background: #fff; border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 6px; }
        .urun-gorsel-kutusu img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .urun-baslik { margin: 0; color: #fff; font-size: 22px; font-weight: bold; }
        
        .fiyat-tablosu { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 12px; overflow: hidden; }
        .fiyat-satiri td { padding: 16px; font-size: 15px; background: rgba(0,0,0,0.4); }
        
        .git-btn { background: linear-gradient(135deg, #ff007f, #b91c1c); color: #fff; padding: 10px 24px; text-decoration: none; border-radius: 20px; float: right; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        .menu-linkleri { display: flex; justify-content: center; gap: 25px; margin-top: 15px; }
        .menu-linkleri a { color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; }

        .sidebar { position: fixed; left: -310px; top: 0; width: 300px; height: 100%; background: #0b0f19; border-right: 2px solid #00f2fe; z-index: 10000; transition: 0.3s; padding: 25px; box-sizing: border-box; }
        .sidebar.aktif { left: 0; }
        .sidebar a { display: block; color: #e2e8f0; padding: 12px 15px; text-decoration: none; margin-bottom: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; }
        .sidebar button { background: #ff007f; width: 100%; padding: 12px; color:#000; font-weight:bold; border:none; margin-bottom:20px; cursor:pointer; border-radius: 8px; }
    </style>
</head>
